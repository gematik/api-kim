openapi: 3.0.3
info:
  title: I_CommonSchemas
  version: 1.0.3
### 1.0.3
# - error code 424 removed
### 1.0.2
# - new error code 424, when default Anwendungskennzeichen will be lost or is necessary
### 1.0.1
# - removed minLength from Password for KIM 1.5.2 compatability
### 1.0.0
# - created

# Shared components-only document.
# OpenAPI 3.0.x still requires a top-level paths object.
paths: {}

components:
  schemas:
    Username:
      type: string
      maxLength: 256
      format: email
      description: Username or email address of the account.
    Password:
      type: string
      maxLength: 256
      format: byte
      # Value must be base64 encoded.
      description: The password must be transmitted as a base64-encoded value.
      writeOnly: true
    Error:
      type: object
      properties:
        message:
          type: string
        traceId:
          type: string
          maxLength: 255
          example: 19aaf69260f63694
          description: Unique character string for tracing the error in the KIM service

  responses:
    400:
      description: Invalid input data. Further details are provided in the error message.
      content:
        application/json; charset=utf-8:
          schema:
            $ref: '#/components/schemas/Error'
    401:
      description: Authentication failed.
      content:
       application/json; charset=utf-8:
        schema:
         $ref: '#/components/schemas/Error'
    404:
      description: The requested resource is not available.
      content:
        application/json; charset=utf-8:
          schema:
            $ref: '#/components/schemas/Error'
    422:
      description: The kimVersion is unknown or not supported.
      content:
        application/json; charset=utf-8:
          schema:
            $ref: '#/components/schemas/Error'
    423:
      description: The VZD entry is locked. The VZD attribute 'active' for the targeted entry is in state "inactive".
      content:
        application/json; charset=utf-8:
          schema:
            $ref: '#/components/schemas/Error'
    500:
      description: Internal Server Error
      content:
        application/json; charset=utf-8:
          schema:
            $ref: '#/components/schemas/Error'
    502:
      description: A dependent service could not be reached or returned an error.
      content:
        application/json; charset=utf-8:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    KIMBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      # The JWT is encoded in compact serialization (RFC 7515, Section 3.1) and transmitted in the HTTP header Authorization according to the bearer schema.

    KIMBasicAuth:
      type: http
      scheme: basic
